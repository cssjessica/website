<script>
    
async function initWeather() {
    let lat = -22.9068; // Default Rio
    let lon = -43.1729;

    // 1. Kick off the weather immediately with defaults
    runWeatherLogic(lat, lon);

    // 2. Then try to get real location (Fast Mode)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                updateLocationName(userLat, userLon);
                runWeatherLogic(userLat, userLon); // Refresh with real location
            },
            () => { /* Stay on Rio if denied */ },
            { enableHighAccuracy: false, timeout: 5000 }
        );
    }
}

async function runWeatherLogic(lat, lon) {
    // --- STEP A: Fast Country Check (with 2-second 'kill switch') ---
    const getCountry = async () => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000); // 2 sec limit
        try {
            const res = await fetch('https://ipapi.co/json/', { signal: controller.signal });
            const data = await res.json();
            return data.country_code === 'US';
        } catch (e) { return false; } 
    };

    const isUS = await getCountry();

    // --- STEP B: Fetch Weather ---
    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,pressure_msl,wind_speed_10m,wind_direction_10m&hourly=precipitation_probability&timezone=auto`;
        const response = await fetch(url);
        const data = await response.json();

        // 1. Temperature
        const tempC = data.current.temperature_2m;
        const unit = isUS ? "°F" : "°C";
        const displayTemp = isUS ? Math.round((tempC * 9/5) + 32) : Math.round(tempC);

        // 1. Get the time from the API response
        const apiTime = new Date(data.current.time);
        const formattedTime = apiTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // 2. Update the UI 
        document.getElementById('update-time').innerText = `Updated: ${formattedTime}`;


        // 2. Update UI
        document.getElementById('temp').innerText = displayTemp;
        document.getElementById('temp-unit').innerText = unit;
        document.getElementById('humidity').innerText = data.current.relative_humidity_2m;
        document.getElementById('pressure').innerText = Math.round(data.current.pressure_msl);
        document.getElementById('wind-speed').innerText = data.current.wind_speed_10m;
        
        const hour = new Date().getHours();
        document.getElementById('precip-prob').innerText = data.hourly.precipitation_probability[hour] || 0;

        // 3. Rotation & Icons
        document.getElementById('wind-dir').style.transform = `rotate(${data.current.wind_direction_10m + 135}deg)`;
        updateWeatherIcon(data.current.weather_code);

    } catch (error) { console.error("Weather failed:", error); }
}


function updateWeatherIcon(code) {
    let iconClass = "fa-sun";
    if (code >= 51 && code <= 67) iconClass = "fa-cloud-showers-heavy";
    else if (code >= 71 && code <= 86) iconClass = "fa-snowflake";
    else if (code >= 1 && code <= 3) iconClass = "fa-cloud";
    else if (code >= 95) iconClass = "fa-bolt";
    document.getElementById('condition-icon').className = `fa-solid ${iconClass}`;
}

// --- Quotes & Background ---
const quotes = [
    { text: "If you love life, don't waste time, for time is what life is made up of.", author: "- Bruce Lee" },

function displayRandomQuote() {
    const selected = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('random-quote').innerText = `"${selected.text}"`;
    document.getElementById('quote-author').innerText = selected.author;
}

const cloudGallery = ['images/home_pic.jpg', 'images/home_pic2.jpg', 'images/home_pic3.jpg', 'images/home_pic4.jpg'];

function applyRandomCloud() {
    const bgLayer = document.querySelector('.background-animation');
    const randomImg = cloudGallery[Math.floor(Math.random() * cloudGallery.length)];
    bgLayer.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('${randomImg}')`;
}


// --- Single Initialization ---
window.addEventListener('load', () => {
    initWeather();
    displayRandomQuote();
    applyRandomCloud();
});
</script>
